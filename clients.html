<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HarimHire – לקוחות</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="harimhire.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDhvquMr_6zODjgFIiU2y1Uzpc2wNgmX0",
  authDomain: "harimhire.firebaseapp.com",
  projectId: "harimhire",
  storageBucket: "harimhire.firebasestorage.app",
  messagingSenderId: "723909250338",
  appId: "1:723909250338:web:70f5ac52e307083379697b"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>
<style>
.side-panel {
  position: fixed;
  right: -500px;
  top: 56px;
  width: 500px;
  height: calc(100vh - 56px);
  background: white;
  border-left: 1px solid #ddd;
  z-index: 9999;
  transition: right 0.3s;
  display: flex;
  flex-direction: column;
}
.side-panel.open {
  right: 0;
}
.panel-header {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-header h3 {
  margin: 0;
  flex: 1;
}
.panel-tabs {
  display: flex;
  border-bottom: 1px solid #ddd;
}
.panel-tabs button {
  flex: 1;
  padding: 8px;
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 2px solid #ddd;
}
.panel-tabs button.active {
  border-bottom-color: #1e3461;
  font-weight: bold;
}
.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.tab {
  display: none;
}
.tab.show {
  display: block;
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-links">
    <a href="index.html" class="logo"><i class="fa-solid fa-home"></i></a>
    <a href="candidates.html">מועמדים</a>
    <a href="clients.html" class="active">לקוחות</a>
    <a href="jobs.html">משרות</a>
  </div>
</nav>

<div class="page">
  <div class="subbar">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <input type="text" id="search" placeholder="חיפוש..." style="padding:8px;border:1px solid #ddd;border-radius:4px;">
      <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> לקוח חדש</button>
    </div>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th></th>
        <th>שם</th>
        <th>טלפון</th>
        <th>דוא"ל</th>
        <th>ישוב</th>
      </tr>
    </thead>
    <tbody id="clientsTable"></tbody>
  </table>
</div>

<!-- SIDE PANEL -->
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <button onclick="closePanel()" style="background:none;border:none;cursor:pointer;"><i class="fa-solid fa-arrow-left"></i></button>
    <h3 id="panelTitle"></h3>
  </div>
  <div class="panel-tabs">
    <button class="active" onclick="showTab('details')">פרטים</button>
    <button onclick="showTab('contacts')">אנשי קשר</button>
    <button onclick="showTab('jobs')">משרות</button>
  </div>
  <div class="panel-content">
    <div class="tab show" id="tab-details">
      <div style="margin-bottom:12px;">
        <label>שם</label>
        <input id="pName" type="text" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;">
      </div>
      <div style="margin-bottom:12px;">
        <label>טלפון</label>
        <input id="pPhone" type="text" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;">
      </div>
      <div style="margin-bottom:12px;">
        <label>דוא"ל</label>
        <input id="pEmail" type="text" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;">
      </div>
      <div style="margin-bottom:12px;">
        <label>ישוב</label>
        <input id="pCity" type="text" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;">
      </div>
    </div>
    <div class="tab" id="tab-contacts">
      <div id="contactsList"></div>
      <button style="width:100%;padding:8px;background:#1e3461;color:white;border:none;border-radius:4px;margin-top:10px;cursor:pointer;"><i class="fa-solid fa-plus"></i> הוסף</button>
    </div>
    <div class="tab" id="tab-jobs">
      <div id="jobsList"></div>
    </div>
  </div>
</div>

<script>
let CLIENTS = [];

db.collection('clients').orderBy('createdAt', 'desc').onSnapshot(function(snap) {
  CLIENTS = snap.docs.map(d => {
    const c = d.data();
    return {
      id: d.id,
      name: c.name || '',
      phone: c.phone || '',
      email: c.email || '',
      city: c.city || '',
      contacts: c.contacts || [],
      jobs: c.jobs || []
    };
  });
  renderTable();
});

function renderTable() {
  const tbody = document.getElementById('clientsTable');
  tbody.innerHTML = CLIENTS.map(c => `
    <tr onclick="openPanel('${c.id}')" style="cursor:pointer;">
      <td><input type="checkbox"></td>
      <td>${c.name}</td>
      <td>${c.phone}</td>
      <td>${c.email}</td>
      <td>${c.city}</td>
    </tr>
  `).join('');
}

function openPanel(id) {
  const c = CLIENTS.find(x => x.id === id);
  if (!c) return;

  document.getElementById('panelTitle').textContent = c.name;
  document.getElementById('pName').value = c.name;
  document.getElementById('pPhone').value = c.phone;
  document.getElementById('pEmail').value = c.email;
  document.getElementById('pCity').value = c.city;

  if (c.contacts && c.contacts.length > 0) {
    document.getElementById('contactsList').innerHTML = c.contacts.map(ct => `
      <div style="padding:8px;background:#f5f5f5;margin-bottom:8px;border-radius:4px;">
        <strong>${ct.name}</strong><br>
        תפקיד: ${ct.role || '-'}<br>
        טלפון: ${ct.phone || '-'}
      </div>
    `).join('');
  } else {
    document.getElementById('contactsList').innerHTML = '<p style="text-align:center;color:#999;">אין אנשי קשר</p>';
  }

  if (c.jobs && c.jobs.length > 0) {
    document.getElementById('jobsList').innerHTML = c.jobs.map(j => `
      <div style="padding:8px;background:#f5f5f5;margin-bottom:8px;border-radius:4px;">
        <strong>${j.title}</strong><br>
        סטטוס: ${j.status || '-'}
      </div>
    `).join('');
  } else {
    document.getElementById('jobsList').innerHTML = '<p style="text-align:center;color:#999;">אין משרות</p>';
  }

  document.getElementById('sidePanel').classList.add('open');
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('show'));
  document.getElementById('tab-' + tab).classList.add('show');
  document.querySelectorAll('.panel-tabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>

</body>
</html>
