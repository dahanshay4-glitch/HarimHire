<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משרה - HarimHire</title>
    <link rel="stylesheet" href="harimhire.css">
    <style>
        .job-card-container {
            max-width: 1000px;
            margin: 80px auto 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .job-header {
            background: linear-gradient(135deg, #1e3461 0%, #e8992e 100%);
            color: white;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .job-title {
            font-size: 24px;
            font-weight: bold;
        }
        
        .job-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            margin-top: 8px;
            opacity: 0.9;
        }
        
        .nav-buttons {
            display: flex;
            gap: 8px;
        }
        
        .nav-button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .nav-button:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            background: #f5f5f5;
        }
        
        .tab {
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 13px;
            color: #666;
            font-weight: 500;
            border-bottom: 3px solid transparent;
        }
        
        .tab.active {
            color: #1e3461;
            border-bottom-color: #e8992e;
        }
        
        .tab-content {
            padding: 24px;
        }
        
        .tab-content.hidden {
            display: none;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .info-item {
            border: 1px solid #e0e0e0;
            padding: 12px;
            border-radius: 4px;
        }
        
        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }
        
        .info-value {
            font-size: 14px;
            font-weight: bold;
            color: #1e3461;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-open {
            background: #4caf50;
            color: white;
        }
        
        .status-paused {
            background: #ff9800;
            color: white;
        }
        
        .status-closed {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-right">
            <span class="logo-text" onclick="window.location.href='index.html'" style="cursor: pointer;">Harim<span class="logo-hire">Hire</span></span>
        </div>
    </div>

    <div class="job-card-container">
        <div class="job-header">
            <div>
                <div class="job-title" id="jobTitle"></div>
                <div class="job-meta">
                    <span>מס׳ משרה: <strong id="jobNumber"></strong></span>
                    <span id="clientLink" style="cursor: pointer; text-decoration: underline;"></span>
                    <span id="statusSpan"></span>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-button" onclick="navigatePrevious()">← הקודמת</button>
                <button class="nav-button" onclick="navigateNext()">הבאה →</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('details')">פרטי משרה</button>
            <button class="tab" onclick="switchTab('cities')">ערים ואזורים</button>
            <button class="tab" onclick="switchTab('candidates')">מועמדים</button>
            <button class="tab" onclick="switchTab('events')">אירועים</button>
        </div>

        <div id="details" class="tab-content">
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">לקוח</div>
                    <div class="info-value" id="jobClient"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">סוג משרה</div>
                    <div class="info-value" id="jobType"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">סטטוס</div>
                    <div id="jobStatus"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">תאריך יצירה</div>
                    <div class="info-value" id="createdDate"></div>
                </div>
            </div>
            <div style="margin-top: 20px;">
                <h3>תיאור המשרה</h3>
                <p id="jobDescription" style="line-height: 1.6;"></p>
            </div>
        </div>

        <div id="cities" class="tab-content hidden">
            <p style="color: #999;">הקמת טאב ערים - בשלב בנייה</p>
        </div>

        <div id="candidates" class="tab-content hidden">
            <div id="candidatesContent"></div>
        </div>

        <div id="events" class="tab-content hidden">
            <p style="color: #999;">היסטוריית אירועים - בשלב בנייה</p>
        </div>
    </div>

    <script src="firebase.js"></script>
    <script>
        let currentJobId = null;
        let allJobs = [];
        let currentJobIndex = 0;
        
        function loadJob() {
            const jobData = sessionStorage.getItem('jobData');
            if (jobData) {
                const job = JSON.parse(jobData);
                displayJob(job);
                currentJobId = job.id;
            } else {
                firestore.collection('jobs')
                    .where('status', '!=', 'deleted')
                    .orderBy('status')
                    .orderBy('createdDate', 'desc')
                    .limit(1)
                    .onSnapshot(snapshot => {
                        if (!snapshot.empty) {
                            const doc = snapshot.docs[0];
                            const job = doc.data();
                            job.id = doc.id;
                            displayJob(job);
                            currentJobId = job.id;
                        }
                    });
            }
        }
        
        function displayJob(job) {
            document.getElementById('jobTitle').textContent = job.title;
            document.getElementById('jobNumber').textContent = job.number;
            document.getElementById('jobClient').textContent = job.clientName;
            document.getElementById('jobType').textContent = job.jobTypeName;
            document.getElementById('createdDate').textContent = new Date(job.createdDate).toLocaleDateString('he-IL');
            document.getElementById('jobDescription').textContent = job.description || 'אין תיאור';
            
            const statusBadge = document.createElement('div');
            statusBadge.className = `status-badge status-${job.status}`;
            statusBadge.textContent = 
                job.status === 'open' ? 'פתוחה' :
                job.status === 'paused' ? 'מוקפאת' : 'סגורה';
            document.getElementById('jobStatus').innerHTML = '';
            document.getElementById('jobStatus').appendChild(statusBadge);
            
            const clientLink = document.getElementById('clientLink');
            clientLink.textContent = job.clientName;
            clientLink.onclick = () => {
                sessionStorage.setItem('clientData', JSON.stringify({
                    id: job.clientId,
                    name: job.clientName
                }));
                window.location.href = 'client.html';
            };
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.remove('hidden');
        }
        
        function navigateNext() {
            alert('ניווט בין משרות - בשלב בנייה');
        }
        
        function navigatePrevious() {
            alert('ניווט בין משרות - בשלב בנייה');
        }
        
        loadJob();
    </script>
</body>
</html>
