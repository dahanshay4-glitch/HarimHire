<head>

    <style>
        .wizard-container {
            max-width: 900px;
            margin: 76px auto 0;
            background: white;
            border: 0.5px solid var(--border, #e2e6ea);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: visible;
        }
        .wizard-header { display: none; }
        .page-title-bar {
            background: #ffffff;
            border-bottom: 0.5px solid var(--border, #e2e6ea);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title-bar h1 {
            margin: 0;
            font-size: 16px;
            color: var(--text, #1a2332);
            font-weight: 600;
        }
        .page-title-bar .step-small {
            font-size: 11px;
            color: var(--text-light, #6b7a99);
        }
        .nav-dropdown { position: relative; display: inline-block; }
        .nav-dropdown > a { display: flex; align-items: center; gap: 5px; padding: 6px 4px; }
        .nav-dropdown > a::after { content: "\25BE"; font-size: 10px; opacity: 0.8; }
        .dropdown-menu { position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #fff; border: 1px solid #dde2ea; border-radius: 8px; box-shadow: 0 6px 24px rgba(0,0,0,0.14); min-width: 200px; z-index: 99999; display: none; overflow: hidden; padding: 5px 0; }
        .dropdown-menu.open { display: block; }
        .dropdown-item { display:flex !important; align-items:center !important; gap:12px !important; padding:12px 18px !important; font-size:13px !important; color:#1a2332 !important; text-decoration:none !important; background:#fff !important; border-bottom:0.5px solid #f0f2f5 !important; white-space:nowrap !important; cursor:pointer !important; }
        .dropdown-item:last-child { border-bottom:none !important; }
        .dropdown-item:hover { background:#f4f6f9 !important; color:#1e3461 !important; }
        .dropdown-item i { font-size:14px !important; color:#6b7a99 !important; width:18px !important; text-align:center !important; flex-shrink:0 !important; }
        .dropdown-item:hover i { color:#1e3461 !important; }
        
        
        .wizard-content {
            padding: 32px 40px 40px;
            min-height: 400px;
        }
        
        .step-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 24px;
            color: #1e3461;
        }
        
        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .client-card {
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .client-card:hover {
            border-color: #e8992e;
            background: #f9f9f9;
        }
        
        .client-card.selected {
            border-color: #e8992e;
            background: #fff8f0;
            font-weight: bold;
        }
        
        .client-info {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }

        .client-select-box {
            max-width: 520px;
            margin: 0 auto 20px;
        }

        .client-select-label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .client-search-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9dce2;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            background: #fff;
        }

        .client-search-input:focus {
            outline: none;
            border-color: #1e3461;
            box-shadow: 0 0 0 2px rgba(30,52,97,0.08);
        }

        .autocomplete-wrap {
            position: relative;
            margin-bottom: 10px;
        }

        .autocomplete-list {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            left: 0;
            background: #fff;
            border: 1px solid #d9dce2;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            max-height: 260px;
            overflow-y: auto;
            z-index: 9999;
            display: none;
        }

        .autocomplete-list.open {
            display: block;
        }

        .autocomplete-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f2f5;
            font-size: 13px;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover,
        .autocomplete-item.active {
            background: #f7f9fc;
            color: #1e3461;
        }

        .autocomplete-item-title {
            font-weight: bold;
            color: #1a2332;
        }

        .autocomplete-item-meta {
            color: #666;
            font-size: 12px;
            margin-top: 3px;
        }

        .autocomplete-empty {
            padding: 10px 12px;
            color: #777;
            font-size: 13px;
        }

        .client-selected-preview {
            background: #f7f9fc;
            border: 1px solid #e2e6ea;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            color: #1a2332;
            min-height: 46px;
        }

        .client-selected-preview strong {
            color: #1e3461;
        }
        
        .selected-info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            justify-content: flex-end;
        }
        
        .btn-primary {
            background: #1e3461;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .job-type-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        
        .job-type-card {
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .job-type-card:hover {
            border-color: #e8992e;
        }
        
        .job-type-card.selected {
            border-color: #e8992e;
            background: #fff8f0;
        }
        
        .job-type-number {
            font-weight: bold;
            font-size: 16px;
            color: #1e3461;
        }
        
        .job-type-name {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }

        .job-type-select-box {
            max-width: 520px;
            margin: 0 auto 20px;
        }

        .job-type-select-label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .job-type-search-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9dce2;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            background: #fff;
        }

        .job-type-search-input:focus {
            outline: none;
            border-color: #1e3461;
            box-shadow: 0 0 0 2px rgba(30,52,97,0.08);
        }

        .job-type-selected-preview {
            background: #f7f9fc;
            border: 1px solid #e2e6ea;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            color: #1a2332;
            min-height: 46px;
        }

        .job-type-selected-preview strong {
            color: #1e3461;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 13px;
            color: #333;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .navigation {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            justify-content: space-between;
        }
    </style>
</head>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDDhvquMr_6zODjgFIiU2y1Uzpc2wNgmX0",
            authDomain: "harimhire.firebaseapp.com",
            projectId: "harimhire",
            storageBucket: "harimhire.firebasestorage.app",
            messagingSenderId: "723909250338",
            appId: "1:723909250338:web:70f5ac52e307083379697b"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const firestore = firebase.firestore();

        let selectedClient = null;
        let selectedJobType = null;
        let allClients = [];
        const urlParams = new URLSearchParams(window.location.search);
        const preselectedClientId = urlParams.get('clientId');
        const preselectedClientName = urlParams.get('clientName');
        
        const defaultJobTypes = {
            '1000': { name: 'עובד מיון', icon: '📦' },
            '1001': { name: 'שליח עצמאי (קבלן)', icon: '🚗' },
            '1002': { name: 'שליח שכיר', icon: '👔' },
            '1003': { name: 'מוקדנים', icon: '☎️' },
            '1004': { name: 'דואר נע', icon: '🚚' }
        };
        let jobTypes = { ...defaultJobTypes };
        
        function loadClients() {
            firestore.collection('clients').onSnapshot(snapshot => {
                allClients = [];
                let counter = 1;
                snapshot.forEach(doc => {
                    const c = doc.data();
                    if (c.status === 'deleted' || c.deleted === true) return;
                    c.id = doc.id;
                    c.num = c.num || counter++;
                    allClients.push(c);
                });
                if (preselectedClientId && !selectedClient) {
                    const match = allClients.find(c => String(c.id) === String(preselectedClientId));
                    if (match) {
                        setSelectedClient(match);
                        const list = document.getElementById('clientSuggestions');
                        if (list) list.classList.remove('open');
                    }
                } else if (preselectedClientName && !selectedClient) {
                    const match = allClients.find(c => String(c.name || '').trim() === String(preselectedClientName).trim());
                    if (match) setSelectedClient(match);
                }
                renderClientOptions();
            }, error => {
                console.error('Error loading clients:', error);
                const list = document.getElementById('clientSuggestions');
                if (list) {
                    list.innerHTML = '<div class="autocomplete-empty">שגיאה בטעינת לקוחות</div>';
                    list.classList.add('open');
                }
            });
        }

        let clientActiveIndex = -1;
        let clientFiltered = [];

        function renderClientOptions() {
            const list = document.getElementById('clientSuggestions');
            const searchInput = document.getElementById('clientSearch');
            const searchTerm = (searchInput ? searchInput.value : '').trim().toLowerCase();
            clientActiveIndex = -1;

            clientFiltered = allClients.filter(c => {
                const name = (c.name || (c.extraCoords && c.extraCoords.name) || '').toLowerCase();
                const city = (c.city || (c.extraCoords && c.extraCoords.city) || '').toLowerCase();
                const type = (c.type || (c.extraCoords && c.extraCoords.type) || '').toLowerCase();
                return !searchTerm || name.startsWith(searchTerm) || city.startsWith(searchTerm) || type.startsWith(searchTerm) || name.includes(searchTerm) || city.includes(searchTerm) || type.includes(searchTerm);
            }).slice(0, 25);

            if (!clientFiltered.length) {
                list.innerHTML = '<div class="autocomplete-empty">לא נמצאו לקוחות</div>';
                list.classList.add('open');
                return;
            }

            list.innerHTML = clientFiltered.map((c, i) => {
                const displayName = c.name || (c.extraCoords && c.extraCoords.name) || 'ללא שם';
                const city = c.city || (c.extraCoords && c.extraCoords.city) || 'לא ידוע';
                const typeVal = c.type || (c.extraCoords && c.extraCoords.type) || '';
                const type = typeVal ? ` · ${typeVal}` : '';
                return `<div class="autocomplete-item" data-index="${i}" onclick="selectClientFromSuggestion(${i})">
                    <div class="autocomplete-item-title">${displayName}</div>
                    <div class="autocomplete-item-meta">${city}${type}</div>
                </div>`;
            }).join('');
            list.classList.add('open');
        }

        function setSelectedClient(client) {
            selectedClient = client;
            const search = document.getElementById('clientSearch');
            const suggestions = document.getElementById('clientSuggestions');
            const next = document.getElementById('nextStep1');
            if (search) search.value = selectedClient.name || (selectedClient.extraCoords && selectedClient.extraCoords.name) || '';
            if (suggestions) suggestions.classList.remove('open');
            if (next) next.disabled = false;
            const preview = document.getElementById('selectedClientPreview');
            if (preview) {
                preview.innerHTML = `<strong>${selectedClient.name || (selectedClient.extraCoords && selectedClient.extraCoords.name) || 'ללא שם'}</strong><br><span style="color:#666;">${selectedClient.city || (selectedClient.extraCoords && selectedClient.extraCoords.city) || 'לא ידוע'}${(selectedClient.type || (selectedClient.extraCoords && selectedClient.extraCoords.type)) ? ' · ' + (selectedClient.type || (selectedClient.extraCoords && selectedClient.extraCoords.type)) : ''}</span>`;
            }
        }

        function selectClientFromSuggestion(index) {
            const client = clientFiltered[index];
            if (!client) return;
            setSelectedClient(client);
        }

        function handleClientKey(event) {
            const list = document.getElementById('clientSuggestions');
            const items = list.querySelectorAll('.autocomplete-item');
            if (!items.length) return;
            if (event.key === 'ArrowDown') {
                event.preventDefault();
                clientActiveIndex = Math.min(clientActiveIndex + 1, items.length - 1);
                updateActiveItem(items, clientActiveIndex);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                clientActiveIndex = Math.max(clientActiveIndex - 1, 0);
                updateActiveItem(items, clientActiveIndex);
            } else if (event.key === 'Enter') {
                event.preventDefault();
                selectClientFromSuggestion(clientActiveIndex >= 0 ? clientActiveIndex : 0);
            } else if (event.key === 'Escape') {
                list.classList.remove('open');
            }
        }

        function selectClient(client) {
            setSelectedClient(client);
        }
        
        function goToStep(step) {
            document.querySelectorAll('.wizard-step').forEach(s => s.style.display = 'none');
            document.getElementById('step' + step).style.display = 'block';
            document.getElementById('stepCounter').textContent = `משרה חדשה - שלב ${step} מתוך 3`;
            
            if (step === 2) {
                if (!selectedClient) { alert('יש לבחור לקוח לפני המשך'); return; }
                document.getElementById('selectedClientInfo').innerHTML = `<strong>לקוח:</strong> ${selectedClient.name || (selectedClient.extraCoords && selectedClient.extraCoords.name) || ''}`;
                loadJobTypes();
                history.pushState({step: 2}, '', '#step2');
            } else if (step === 3) {
                if (!selectedJobType) { alert('יש לבחור סוג משרה לפני המשך'); return; }
                document.getElementById('selectedJobTypeInfo').innerHTML = `<strong>סוג משרה:</strong> ${selectedJobType.name}`;
                history.pushState({step: 3}, '', '#step3');
            } else if (step === 1) {
                history.pushState({step: 1}, '', '#step1');
            }
        }
        
        function loadJobTypes() {
            // סוגי משרה הם ישות נפרדת: 1002 = שליח שכיר וכו'.
            // אם הוגדרו ב-Firestore נשתמש בהם; אם לא, נשאיר ברירת מחדל כדי שהמערכת תמשיך לעבוד.
            firestore.collection('jobTypes').get().then(snapshot => {
                const liveTypes = {};
                snapshot.forEach(doc => {
                    const data = doc.data() || {};
                    if (data.status === 'deleted' || data.deleted === true || data.active === false) return;
                    const code = String(data.code || data.num || data.number || doc.id || '').trim();
                    const name = String(data.name || data.title || data.jobTypeName || '').trim();
                    if (!code || !name) return;
                    liveTypes[code] = {
                        name: name,
                        icon: data.icon || ''
                    };
                });
                if (Object.keys(liveTypes).length) jobTypes = liveTypes;
                renderJobTypeOptions();
            }).catch(err => {
                console.log('Job types Firebase error:', err);
                renderJobTypeOptions();
            });
        }

        let jobTypeActiveIndex = -1;
        let jobTypeFiltered = [];

        function renderJobTypeOptions() {
            const list = document.getElementById('jobTypeSuggestions');
            const searchInput = document.getElementById('jobTypeSearch');
            if (!list) return;
            const searchTerm = (searchInput ? searchInput.value : '').trim().toLowerCase();
            jobTypeActiveIndex = -1;

            jobTypeFiltered = Object.entries(jobTypes).filter(([code, details]) => {
                const name = (details.name || '').toLowerCase();
                return !searchTerm || code.startsWith(searchTerm) || name.startsWith(searchTerm) || code.includes(searchTerm) || name.includes(searchTerm);
            }).map(([code, details]) => ({ code, ...details }));

            if (!jobTypeFiltered.length) {
                list.innerHTML = '<div class="autocomplete-empty">לא נמצאו סוגי משרה</div>';
                list.classList.add('open');
                return;
            }

            list.innerHTML = jobTypeFiltered.map((jt, i) => `
                <div class="autocomplete-item" data-index="${i}" onclick="selectJobTypeFromSuggestion(${i})">
                    <div class="autocomplete-item-title">${jt.code} – ${jt.name}</div>
                </div>
            `).join('');
            list.classList.add('open');
        }

        function selectJobTypeFromSuggestion(index) {
            const jt = jobTypeFiltered[index];
            if (!jt) return;
            selectedJobType = { code: jt.code, name: jt.name };
            document.getElementById('jobTypeSearch').value = `${jt.code} – ${jt.name}`;
            document.getElementById('jobTypeSuggestions').classList.remove('open');
            document.getElementById('nextStep2').disabled = false;
            document.getElementById('selectedJobTypePreview').innerHTML = `<strong>${selectedJobType.code} – ${selectedJobType.name}</strong>`;
        }

        function handleJobTypeKey(event) {
            const list = document.getElementById('jobTypeSuggestions');
            const items = list.querySelectorAll('.autocomplete-item');
            if (!items.length) return;
            if (event.key === 'ArrowDown') {
                event.preventDefault();
                jobTypeActiveIndex = Math.min(jobTypeActiveIndex + 1, items.length - 1);
                updateActiveItem(items, jobTypeActiveIndex);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                jobTypeActiveIndex = Math.max(jobTypeActiveIndex - 1, 0);
                updateActiveItem(items, jobTypeActiveIndex);
            } else if (event.key === 'Enter') {
                event.preventDefault();
                selectJobTypeFromSuggestion(jobTypeActiveIndex >= 0 ? jobTypeActiveIndex : 0);
            } else if (event.key === 'Escape') {
                list.classList.remove('open');
            }
        }

        function updateActiveItem(items, activeIndex) {
            items.forEach((item, i) => item.classList.toggle('active', i === activeIndex));
            if (items[activeIndex]) items[activeIndex].scrollIntoView({ block: 'nearest' });
        }

        document.addEventListener('click', (event) => {
            if (!event.target.closest('.autocomplete-wrap')) {
                const clientList = document.getElementById('clientSuggestions');
                const jobTypeList = document.getElementById('jobTypeSuggestions');
                if (clientList) clientList.classList.remove('open');
                if (jobTypeList) jobTypeList.classList.remove('open');
            }
        });
        
        async function saveJob() {
            
            if (!selectedClient) {
                alert('יש לבחור לקוח');
                return;
            }
            if (!selectedJobType) {
                alert('יש לבחור סוג משרה');
                return;
            }
            
            try {
                const jobsSnapshot = await firestore.collection('jobs').get();
                const jobNumber = 1000 + jobsSnapshot.size + 1;
                
                // validityDays is a job-level rule compared against candidateInterest.createdAt.
                // returnMonths prevents re-entering candidates who were recently in process for the same jobType.
                await firestore.collection('jobs').add({
                    clientId: String(selectedClient.id),
                    clientName: selectedClient.name || (selectedClient.extraCoords && selectedClient.extraCoords.name) || '',
                    clientCity: selectedClient.city || (selectedClient.extraCoords && selectedClient.extraCoords.city) || '',
                    clientType: selectedClient.type || (selectedClient.extraCoords && selectedClient.extraCoords.type) || '',
                    jobType: selectedJobType.code,
                    jobTypeCode: selectedJobType.code,
                    jobTypeName: selectedJobType.name,
                    typeName: selectedJobType.code + ' – ' + selectedJobType.name,
                    number: jobNumber,
                    num: jobNumber,
                    title: selectedJobType.name,
                    description: document.getElementById('jobDescription').value,
                    requirements: {
                        maritalStatus: document.getElementById('reqMaritalStatus').value,
                        mobility: document.getElementById('reqMobility').value,
                        gender: document.getElementById('reqGender').value,
                        driverLicense: document.getElementById('reqDriverLicense').value,
                        ageMin: parseInt(document.getElementById('reqAgeMin').value) || 18,
                        ageMax: parseInt(document.getElementById('reqAgeMax').value) || 67,
                        salaryMin: parseInt(document.getElementById('reqSalaryMin').value) || 0,
                        salaryMax: parseInt(document.getElementById('reqSalaryMax').value) || 1000000,
                        validityDays: parseInt(document.getElementById('reqValidityDays').value) || 60,
                        returnMonths: parseInt(document.getElementById('reqReturnMonths').value) || 3,
                        includeUnknownAvailability: document.getElementById('reqIncludeUnknownAvailability').checked,
                        includeUnknownAge: document.getElementById('reqIncludeUnknownAge').checked,
                        includeUnknownSalary: document.getElementById('reqIncludeUnknownSalary').checked
                    },
                    status: 'open',
                    createdDate: new Date().toISOString(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    interestedCount: 0,
                    inProcessCount: 0,
                    hiredCount: 0
                });
                
                alert(`משרה ${jobNumber} נוצרה בהצלחה!`);
                window.location.href = 'jobs.html';
            } catch (error) {
                console.error('Error:', error);
                alert('שגיאה בשמירה: ' + error.message);
            }
        }
        
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.step) {
                goToStep(e.state.step);
            }
        });
        
        loadClients();
        history.pushState({step: 1}, '', '#step1');
    </script>

    <script>
    (function() {
      var closeTimer = null;
      var currentOpen = null;
      function openMenu(wrapper) {
        if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
        if (currentOpen && currentOpen !== wrapper) {
          var other = currentOpen.querySelector('.dropdown-menu');
          if (other) other.classList.remove('open');
        }
        currentOpen = wrapper;
        var menu = wrapper.querySelector('.dropdown-menu');
        if (menu) menu.classList.add('open');
      }
      function closeMenu(wrapper) {
        closeTimer = setTimeout(function() {
          var menu = wrapper.querySelector('.dropdown-menu');
          if (menu) menu.classList.remove('open');
          if (currentOpen === wrapper) currentOpen = null;
        }, 250);
      }
      document.querySelectorAll('.nav-dropdown').forEach(function(wrapper) {
        wrapper.addEventListener('mouseenter', function() { openMenu(wrapper); });
        wrapper.addEventListener('mouseleave', function() { closeMenu(wrapper); });
        var menu = wrapper.querySelector('.dropdown-menu');
        if (menu) {
          menu.addEventListener('mouseenter', function() { openMenu(wrapper); });
          menu.addEventListener('mouseleave', function() { closeMenu(wrapper); });
        }
      });
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.nav-dropdown')) {
          document.querySelectorAll('.dropdown-menu.open').forEach(function(m) { m.classList.remove('open'); });
          currentOpen = null;
        }
      });
    })();
    </script>
</body>
