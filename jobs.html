<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משרות - HarimHire</title>
    <link rel="stylesheet" href="harimhire.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-right">
            <span class="logo-text">Harim<span class="logo-hire">Hire</span></span>
            <div class="icons-group">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="12" cy="12" r="1"></circle>
                    <circle cx="19" cy="12" r="1"></circle>
                    <circle cx="5" cy="12" r="1"></circle>
                </svg>
            </div>
        </div>
        <div class="navbar-left">
            <div class="dropdown-wrapper">
                <button class="nav-link" onclick="window.location.href='index.html'">מועמדים <span class="dropdown-arrow">▼</span></button>
                <div class="dropdown-menu" style="display:none; min-width: 200px;">
                    <a href="candidates.html" onclick="event.stopPropagation()">מועמדים</a>
                    <a href="new_candidate.html" onclick="event.stopPropagation()">מועמד חדש</a>
                    <a href="segments.html" onclick="event.stopPropagation()">חיתוכי מועמדים</a>
                    <a href="referrals.html" onclick="event.stopPropagation()">הפניות</a>
                </div>
            </div>
            <div class="dropdown-wrapper">
                <button class="nav-link" onclick="showSection('jobs')" style="color: #fff; border-bottom: 3px solid #e8992e;">משרות <span class="dropdown-arrow">▼</span></button>
                <div class="dropdown-menu" style="display:none; min-width: 200px;">
                    <a href="jobs.html" onclick="event.stopPropagation()">משרות</a>
                    <a href="my_jobs.html" onclick="event.stopPropagation()">המשרות שלי</a>
                    <a href="new_job.html" onclick="event.stopPropagation()">משרה חדשה</a>
                </div>
            </div>
            <div class="dropdown-wrapper">
                <button class="nav-link" onclick="window.location.href='clients.html'">לקוחות <span class="dropdown-arrow">▼</span></button>
                <div class="dropdown-menu" style="display:none; min-width: 200px;">
                    <a href="clients.html" onclick="event.stopPropagation()">לקוחות</a>
                    <a href="new_client.html" onclick="event.stopPropagation()">לקוח חדש</a>
                </div>
            </div>
            <button class="nav-link" onclick="window.location.href='process.html'">תהליך ראשוני</button>
            <button class="nav-link" onclick="window.location.href='fixes.html'">תיקונים</button>
            <button class="nav-link" onclick="window.location.href='tags.html'">תגיות</button>
            <div class="dropdown-wrapper">
                <button class="nav-link" onclick="showSection('reports')">דוחות <span class="dropdown-arrow">▼</span></button>
                <div class="dropdown-menu" style="display:none; min-width: 200px;">
                    <a href="#" onclick="event.stopPropagation()">דוח מועמדים</a>
                    <a href="#" onclick="event.stopPropagation()">דוח משרות</a>
                    <a href="#" onclick="event.stopPropagation()">דוח הפניות</a>
                </div>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="page-header">
            <h1>משרות</h1>
        </div>

        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="חיפוש משרה..." class="filter-input">
            <select id="statusFilter" class="filter-input">
                <option value="">כל הסטטוסים</option>
                <option value="open">פתוחה</option>
                <option value="paused">מוקפאת</option>
                <option value="closed">סגורה</option>
            </select>
            <button class="btn-secondary" onclick="toggleColumns()">עמודות</button>
        </div>

        <div class="table-container">
            <table id="jobsTable" class="data-table">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">מס׳</th>
                        <th onclick="sortTable(1)">כותרת</th>
                        <th onclick="sortTable(2)">לקוח</th>
                        <th onclick="sortTable(3)">סטטוס</th>
                        <th onclick="sortTable(4)">תאריך יצירה</th>
                        <th onclick="sortTable(5)">מתעניינים</th>
                        <th onclick="sortTable(6)">בתהליך</th>
                        <th onclick="sortTable(7)">התחילו</th>
                    </tr>
                </thead>
                <tbody id="jobsTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script>
        let allJobs = [];
        let renderedJobs = [];
        let sortState = { field: 'createdDate', dir: -1 };

        function safeText(value, fallback = '') {
            return value === undefined || value === null || value === '' ? fallback : String(value);
        }

        function getJobNumber(job, index) {
            return job.number || job.num || job.jobNumber || (index + 1);
        }

        function getJobTitle(job) {
            return safeText(job.title || job.jobTitle || job.jobTypeName, 'ללא כותרת');
        }

        function getClientName(job) {
            return safeText(job.clientName || job.client || job.customerName, 'לא ידוע');
        }

        function getJobTypeName(job) {
            const code = job.jobType || job.jobTypeCode || '';
            const name = job.jobTypeName || job.typeName || '';
            if (code && name) return `${code} – ${name}`;
            return safeText(name || code || job.type, '');
        }

        function normalizeStatus(status) {
            const s = safeText(status, 'open');
            if (['open', 'פתוחה', 'פעילה'].includes(s)) return 'open';
            if (['paused', 'מוקפאת', 'הוקפאה'].includes(s)) return 'paused';
            if (['closed', 'סגורה'].includes(s)) return 'closed';
            if (['deleted', 'מחוקה'].includes(s)) return 'deleted';
            return s;
        }

        function statusLabel(status) {
            const s = normalizeStatus(status);
            if (s === 'open') return 'פתוחה';
            if (s === 'paused') return 'מוקפאת';
            if (s === 'closed') return 'סגורה';
            if (s === 'deleted') return 'מחוקה';
            return safeText(status, 'לא ידוע');
        }

        function statusClass(status) {
            const s = normalizeStatus(status);
            if (s === 'open') return 'status-open';
            if (s === 'paused') return 'status-paused';
            if (s === 'closed') return 'status-closed';
            return 'status-closed';
        }

        function toDateValue(value) {
            if (!value) return null;
            if (value.toDate && typeof value.toDate === 'function') return value.toDate();
            if (value instanceof Date) return value;
            const d = new Date(value);
            return isNaN(d.getTime()) ? null : d;
        }

        function formatDate(value) {
            const d = toDateValue(value);
            return d ? d.toLocaleDateString('he-IL') : '';
        }

        function countField(job, ...names) {
            for (const name of names) {
                const val = job[name];
                if (typeof val === 'number') return val;
                if (typeof val === 'string' && val.trim() !== '' && !isNaN(Number(val))) return Number(val);
            }
            return 0;
        }

        function renderJobs() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const tbody = document.getElementById('jobsTableBody');

            renderedJobs = allJobs.filter(job => {
                const status = normalizeStatus(job.status);
                if (status === 'deleted') return false;
                if (statusFilter && status !== statusFilter) return false;
                if (!searchTerm) return true;
                const haystack = [
                    getJobNumber(job, 0),
                    getJobTitle(job),
                    getClientName(job),
                    getJobTypeName(job),
                    statusLabel(job.status)
                ].join(' ').toLowerCase();
                return haystack.includes(searchTerm);
            });

            sortJobsInMemory();

            if (!renderedJobs.length) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:#777;">לא נמצאו משרות להצגה</td></tr>';
                return;
            }

            tbody.innerHTML = renderedJobs.map((j, index) => {
                const jobNumber = getJobNumber(j, index);
                const waiting = countField(j, 'waitingCount', 'interestedCount', 'matchesCount', 'pendingScreeningCount');
                const inProcess = countField(j, 'processCount', 'inProcessCount', 'activeProcessCount');
                const hired = countField(j, 'hiredCount', 'startedCount');
                const created = j.createdDate || j.createdAt || j.created;

                return `
                    <tr onclick="openJob('${j.id}')">
                        <td>${jobNumber}</td>
                        <td>${getJobTitle(j)}</td>
                        <td>${getClientName(j)}</td>
                        <td><span class="status-badge ${statusClass(j.status)}">${statusLabel(j.status)}</span></td>
                        <td>${formatDate(created)}</td>
                        <td><span class="clickable-number" onclick="event.stopPropagation(); openCandidatesList('waiting', '${j.id}')">${waiting}</span></td>
                        <td><span class="clickable-number" onclick="event.stopPropagation(); openCandidatesList('inProcess', '${j.id}')">${inProcess}</span></td>
                        <td><span class="clickable-number" onclick="event.stopPropagation(); openCandidatesList('hired', '${j.id}')">${hired}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function sortJobsInMemory() {
            const field = sortState.field;
            const dir = sortState.dir;
            renderedJobs.sort((a, b) => {
                let av, bv;
                if (field === 'number') {
                    av = Number(getJobNumber(a, 0)) || 0;
                    bv = Number(getJobNumber(b, 0)) || 0;
                } else if (field === 'title') {
                    av = getJobTitle(a);
                    bv = getJobTitle(b);
                } else if (field === 'client') {
                    av = getClientName(a);
                    bv = getClientName(b);
                } else if (field === 'status') {
                    av = statusLabel(a.status);
                    bv = statusLabel(b.status);
                } else if (field === 'createdDate') {
                    av = (toDateValue(a.createdDate || a.createdAt || a.created) || new Date(0)).getTime();
                    bv = (toDateValue(b.createdDate || b.createdAt || b.created) || new Date(0)).getTime();
                } else if (field === 'waiting') {
                    av = countField(a, 'waitingCount', 'interestedCount', 'matchesCount', 'pendingScreeningCount');
                    bv = countField(b, 'waitingCount', 'interestedCount', 'matchesCount', 'pendingScreeningCount');
                } else if (field === 'process') {
                    av = countField(a, 'processCount', 'inProcessCount', 'activeProcessCount');
                    bv = countField(b, 'processCount', 'inProcessCount', 'activeProcessCount');
                } else if (field === 'hired') {
                    av = countField(a, 'hiredCount', 'startedCount');
                    bv = countField(b, 'hiredCount', 'startedCount');
                }

                if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dir;
                return String(av || '').localeCompare(String(bv || ''), 'he') * dir;
            });
        }

        function sortTable(colIndex) {
            const fields = ['number', 'title', 'client', 'status', 'createdDate', 'waiting', 'process', 'hired'];
            const field = fields[colIndex] || 'createdDate';
            if (sortState.field === field) {
                sortState.dir *= -1;
            } else {
                sortState.field = field;
                sortState.dir = field === 'createdDate' ? -1 : 1;
            }
            renderJobs();
        }

        function openJob(jobId) {
            const job = allJobs.find(j => j.id === jobId);
            if (!job) return;
            sessionStorage.setItem('jobData', JSON.stringify(job));
            sessionStorage.setItem('jobId', jobId);
            window.location.href = 'job.html';
        }

        function openCandidatesList(type, jobId) {
            sessionStorage.setItem('filterType', type);
            sessionStorage.setItem('filterJobId', jobId);
            window.location.href = 'candidates.html';
        }

        function loadJobsFromFirestore() {
            if (!window.firestore) {
                document.getElementById('jobsTableBody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:#dc3545;">שגיאה: Firebase לא נטען</td></tr>';
                return;
            }

            // Important: no Firestore where/orderBy combination here, to avoid index errors.
            firestore.collection('jobs').onSnapshot(snapshot => {
                allJobs = snapshot.docs.map((doc, index) => ({ id: doc.id, _index: index, ...doc.data() }));
                renderJobs();
            }, error => {
                console.error('Error loading jobs:', error);
                document.getElementById('jobsTableBody').innerHTML = `<tr><td colspan="8" style="text-align:center;padding:24px;color:#dc3545;">שגיאה בטעינת משרות: ${error.message}</td></tr>`;
            });
        }

        document.getElementById('searchInput').addEventListener('input', renderJobs);
        document.getElementById('statusFilter').addEventListener('change', renderJobs);

        document.querySelectorAll('.dropdown-wrapper').forEach(wrapper => {
            wrapper.addEventListener('mouseenter', () => {
                const menu = wrapper.querySelector('.dropdown-menu');
                if (menu) menu.style.display = 'block';
            });
            wrapper.addEventListener('mouseleave', () => {
                const menu = wrapper.querySelector('.dropdown-menu');
                if (menu) menu.style.display = 'none';
            });
        });

        loadJobsFromFirestore();
    </script>
</body>
</html>
