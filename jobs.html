<style>
.nav-dropdown { position: relative; display: inline-block; }
.nav-dropdown > a { display: flex; align-items: center; gap: 5px; padding: 6px 4px; }
.nav-dropdown > a::after { content: "\25BE"; font-size: 10px; opacity: 0.8; }
.dropdown-menu {
  position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: #ffffff; border: 1px solid #dde2ea; border-radius: 8px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.14); min-width: 200px; z-index: 99999;
  display: none; overflow: hidden; padding: 5px 0;
}
.dropdown-menu.open { display: block; }
.dropdown-item {
  display: flex !important; align-items: center !important; gap: 12px !important;
  padding: 12px 18px !important; font-size: 13px !important; color: #1a2332 !important;
  text-decoration: none !important; background: #ffffff !important; border-bottom: 0.5px solid #f0f2f5 !important;
  white-space: nowrap !important; cursor: pointer !important; border-right: none !important; border-left: none !important; border-top: none !important;
}
.dropdown-item:last-child { border-bottom: none !important; }
.dropdown-item:hover { background: #f4f6f9 !important; color: #1e3461 !important; }
.dropdown-item i { font-size: 14px !important; color: #6b7a99 !important; width: 18px !important; text-align: center !important; flex-shrink: 0 !important; }
.dropdown-item:hover i { color: #1e3461 !important; }
.subbar{margin:0 0 0.75rem 0 !important;padding:8px 1.2rem;}
.status-open { background: rgba(28,169,122,0.12); color: #0e7a55; }
.status-paused { background: rgba(232,153,46,0.15); color: #b5720a; }
.status-closed { background: rgba(138,154,181,0.2); color: #6b7a99; }
.clickable-number { color: var(--blue); cursor: pointer; font-weight: 500; }
.clickable-number:hover { text-decoration: underline; }
.table-wrap table { font-size: 14px; }
th { cursor: pointer; user-select: none; }
</style>

<style>
/* Hard isolated navbar for jobs page - prevents broken legacy nav styles */
#hhNav { background:#1e3461; height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 1.4rem; position:fixed; top:0; left:0; right:0; z-index:1000; box-sizing:border-box; font-family:var(--font, 'Segoe UI', Arial, sans-serif); direction:rtl; }
#hhNav * { box-sizing:border-box; }
#hhNav .hh-logo { display:flex; align-items:center; gap:10px; cursor:pointer; color:#fff; text-decoration:none; }
#hhNav .hh-logo img { width:34px; height:25px; }
#hhNav .hh-left { display:flex; align-items:center; gap:14px; }
#hhNav .hh-icons { display:flex; gap:12px; color:rgba(255,255,255,.65); font-size:15px; margin-left:8px; }
#hhNav .hh-links { display:flex; align-items:center; gap:1.35rem; height:56px; }
#hhNav .hh-link, #hhNav .hh-drop-title { color:rgba(255,255,255,.76); font-size:14px; text-decoration:none; cursor:pointer; padding:18px 2px 15px; height:56px; display:flex; align-items:center; gap:5px; background:transparent !important; border:0 !important; outline:0 !important; font-family:var(--font, 'Segoe UI', Arial, sans-serif); white-space:nowrap; }
#hhNav .hh-link:hover, #hhNav .hh-drop-title:hover { color:#fff; }
#hhNav .hh-link.active, #hhNav .hh-drop-title.active { color:#fff; font-weight:600; border-bottom:2.5px solid #e8992e !important; }
#hhNav .hh-drop { position:relative; height:56px; display:flex; align-items:center; }
#hhNav .hh-drop-title::after { content:'▾'; font-size:10px; opacity:.8; margin-right:3px; }
#hhNav .hh-menu { position:absolute; top:56px; right:50%; transform:translateX(50%); background:#fff; border:1px solid #dde2ea; border-radius:8px; box-shadow:0 6px 24px rgba(0,0,0,.14); min-width:200px; display:none; overflow:hidden; padding:5px 0; z-index:100000; }
#hhNav .hh-drop:hover .hh-menu { display:block; }
#hhNav .hh-item { display:flex; align-items:center; gap:12px; padding:12px 18px; font-size:13px; color:#1a2332; text-decoration:none; background:#fff; border-bottom:.5px solid #f0f2f5; white-space:nowrap; }
#hhNav .hh-item:hover { background:#f4f6f9; color:#1e3461; }
#hhNav .hh-item i { color:#6b7a99; width:18px; text-align:center; }
</style>
</head>

<!-- NAVBAR -->

      </div>

      <a class="hh-drop-title" href="clients.html">לקוחות</a>
      <div class="hh-menu">
        <a class="hh-item" href="clients.html"><i class="fa-solid fa-building"></i> לקוחות</a>
        <a class="hh-item" href="new_client.html"><i class="fa-solid fa-building-circle-arrow-right"></i> לקוח חדש</a>
      </div>
    </div>
    <div class="hh-drop">

        <a class="hh-item" href="jobs.html"><i class="fa-solid fa-briefcase"></i> משרות</a>

        <a class="hh-item" href="#"><i class="fa-solid fa-bullseye"></i> דוח מקורות גיוס</a>

  <div class="hh-left">

    </a>
  </div>
</nav>

<div class="main">
  <div style="padding:0.75rem 1rem;">
    <div class="filter-bar">
      <div class="fg"><div class="fl">חיפוש</div><div class="fiw"><input type="text" id="searchInput" placeholder="שם משרה, לקוח, סוג..." oninput="renderTable()"><i class="fa-solid fa-search ic"></i></div></div>
      <div class="fg narrow"><div class="fl">סטטוס</div><div class="fiw"><select id="statusFilter" onchange="renderTable()"><option value="">הכל</option><option value="open">פתוחה</option><option value="paused">מוקפאת</option><option value="closed">סגורה</option></select><i class="fa-solid fa-chevron-down ic"></i></div></div>
      <button class="btn btn-primary" onclick="window.location.href='new_job.html'"><i class="fa-solid fa-plus"></i> משרה חדשה</button>
      <button class="btn btn-export"><i class="fa-solid fa-download"></i> ייצוא</button>
    </div>
    <div class="count-bar">מציג <strong id="jobsCount">0</strong> משרות</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortTable(0)">מס׳ <span>&#8597;</span></th>
            <th onclick="sortTable(1)">כותרת משרה <span>&#8597;</span></th>
            <th onclick="sortTable(2)">לקוח <span>&#8597;</span></th>
            <th onclick="sortTable(3)">סטטוס <span>&#8597;</span></th>
            <th onclick="sortTable(4)">תאריך יצירה <span>&#8597;</span></th>
            <th onclick="sortTable(5)">מתעניינים <span>&#8597;</span></th>
            <th onclick="sortTable(6)">בתהליך <span>&#8597;</span></th>
            <th onclick="sortTable(7)">התחילו לעבוד <span>&#8597;</span></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="jobsTableBody"></tbody>
      </table>
    </div>
  </div>
</div>
<script type="module">
import { db, watchJobs, watchCandidates } from "./firebase.js";

function formatDate(v) {
  try {
    if (!v) return '';
    if (v.toDate) return v.toDate().toLocaleDateString('he-IL');
    return new Date(v).toLocaleDateString('he-IL');
  } catch(e) { return ''; }
}

function statusLabel(s) {
  if (s === 'open') return 'פתוחה';
  if (s === 'paused') return 'מוקפאת';
  if (s === 'closed') return 'סגורה';
  return s || 'לא ידוע';
}

let jobsUnsub = null;
let activeClientIds = new Set();
let activeClientNames = new Set();
let candidatesUnsub = null;
let currentCandidates = [];

function calcJobCounts(j) {
  if (!j.cities || !Array.isArray(j.cities) || j.cities.length === 0) return { interested: 0, inProcess: 0, hired: 0 };
  var cityNorms = j.cities.map(function(c) { return c.trim().toLowerCase(); });
  var interested = 0, inProcess = 0, hired = 0;
  currentCandidates.forEach(function(c) {
    if (!c.city) return;
    if (c.deleted || c.status === 'deleted') return;
    var cNorm = c.city.trim().toLowerCase();
    if (!cityNorms.includes(cNorm)) return;
    interested++;
    var s = c.status || '';
    if (s.includes('בתהליך')) inProcess++;
    if (s.includes('התקבל')) hired++;
  });
  return { interested: interested, inProcess: inProcess, hired: hired };
}

async function refreshActiveClients() {
  const { getClients } = await import('./firebase.js');
  activeClientIds = new Set();
  activeClientNames = new Set();
  try {
    const clients = await getClients();
    clients.forEach(c => {
      if (c.status === 'deleted' || c.deleted === true) return;
      activeClientIds.add(String(c.id));
      if (c.name) activeClientNames.add(String(c.name).trim());
    });
  } catch (err) { console.error('Clients sync error:', err); }
}

function jobHasActiveClient(j) {
  const clientId = j.clientId ? String(j.clientId) : '';
  const clientName = j.clientName ? String(j.clientName).trim() : '';
  if (!clientId && !clientName) return false;
  if (clientId && activeClientIds.has(clientId)) return true;
  if (clientName && activeClientNames.has(clientName)) return true;
  return false;
}

function renderTable() {
  const tbody = document.getElementById('jobsTableBody');
  const searchTerm = (document.getElementById('searchInput').value || '').toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  const filtered = window.currentJobs.filter(j => {
    if (j.status === 'deleted' || j.deleted === true || j.isDeleted) return false;
    if (!jobHasActiveClient(j)) return false;
    if (!j.status) j.status = 'פתוחה';
    if (!j.title) j.title = j.jobTypeName || '';
    const haystack = [j.num, j.title, j.clientName, j.typeName, j.jobTypeName, j.jobTypeCode, j.status].join(' ').toLowerCase();
    if (searchTerm && !haystack.includes(searchTerm)) return false;
    if (statusFilter && j.status !== statusFilter) return false;
    return true;
  });
  document.getElementById('jobsCount').textContent = filtered.length;
  tbody.innerHTML = '';
  filtered.forEach((j, displayIndex) => {
    const row = document.createElement('tr');
    const created = formatDate(j.createdDate || j.createdAt);
    const title = j.title || j.jobTypeName || '';
    const clientId = j.clientId || '';
    const serialNum = filtered.length - displayIndex;
    const counts = calcJobCounts(j);
    row.innerHTML = '<td>' + serialNum + '</td>' +
      '<td><a href="job.html?id=' + encodeURIComponent(j.id) + '" onclick="event.stopPropagation()">' + title + '</a></td>' +
      '<td><a href="clients.html?id=' + encodeURIComponent(clientId) + '" onclick="event.stopPropagation()">' + (j.clientName || 'לא ידוע') + '</a></td>' +
      '<td><span class="pill status-' + (j.status || '') + '">' + statusLabel(j.status) + '</span></td>' +
      '<td>' + created + '</td>' +
      '<td><span class="clickable-number" onclick="event.stopPropagation(); openCandidatesList(\'interested\', \'' + j.id + '\')">' + counts.interested + '</span></td>' +
      '<td><span class="clickable-number" onclick="event.stopPropagation(); openCandidatesList(\'inProcess\', \'' + j.id + '\')">' + counts.inProcess + '</span></td>' +
      '<td><span class="clickable-number" onclick="event.stopPropagation(); openCandidatesList(\'hired\', \'' + j.id + '\')">' + counts.hired + '</span></td>' +
      '<td><button class="btn" style="padding:2px 6px;color:#999;" title="מחיקה" onclick="event.stopPropagation(); window.confirmDeleteJob(\'' + j.id + '\')"><i class="fa-solid fa-trash"></i></button></td>';
    row.addEventListener('click', function() {
      sessionStorage.setItem('jobData', JSON.stringify(j));
      window.location.href = 'job.html?id=' + encodeURIComponent(j.id);
    });
    tbody.appendChild(row);
  });
}

function sortTable(colIndex) {
  if (window.lastSortCol === colIndex) {
    window.sortOrder[colIndex] = window.sortOrder[colIndex] === 'asc' ? 'desc' : 'asc';
  } else {
    window.sortOrder[colIndex] = 'desc';
    window.lastSortCol = colIndex;
  }
  window.currentJobs.sort(function(a, b) {
    var aVal, bVal;
    switch(colIndex) {
      case 0: aVal = Number(a.num); bVal = Number(b.num); break;
      case 1: aVal = (a.title || ''); bVal = (b.title || ''); break;
      case 2: aVal = (a.clientName || ''); bVal = (b.clientName || ''); break;
      case 3: aVal = (a.status || ''); bVal = (b.status || ''); break;
      case 4: aVal = String(a.createdDate || a.createdAt || ''); bVal = String(b.createdDate || b.createdAt || ''); break;
      case 5: aVal = calcJobCounts(a).interested; bVal = calcJobCounts(b).interested; break;
      case 6: aVal = calcJobCounts(a).inProcess; bVal = calcJobCounts(b).inProcess; break;
      case 7: aVal = calcJobCounts(a).hired; bVal = calcJobCounts(b).hired; break;
      default: aVal = ''; bVal = '';
    }
    if (window.sortOrder[colIndex] === 'asc') {
      return String(aVal).localeCompare(String(bVal), 'he');
    } else {
      return String(bVal).localeCompare(String(aVal), 'he');
    }
  });
  window.renderTable();
}

window.renderTable = renderTable;
window.sortTable = sortTable;

window.confirmDeleteJob = function(jobId) {
  if (!confirm('למחוק את המשרה?')) return;
  deleteDoc(doc(db, 'jobs', jobId)).catch(err => { console.error('Delete job error:', err); alert('שגיאה במחיקה'); });
};

window.currentJobs = [];
window.sortOrder = {};
window.lastSortCol = null;

function openCandidatesList(type, jobId) {
  // Resolve job cities from live jobs list and pass via URL params to candidates.html
  var cities = [];
  var jobs = window.currentJobs || [];
  for (var i = 0; i < jobs.length; i++) {
    if (jobs[i].id === jobId) {
      cities = jobs[i].cities || [];
      break;
    }
  }
  var params = new URLSearchParams();
  params.set('jobId', jobId);
  params.set('filterType', type);
  if (cities.length > 0) params.set('cities', JSON.stringify(cities));
  window.location.href = 'candidates.html?' + params.toString();
}

window.openCandidatesList = openCandidatesList;

refreshActiveClients().then(function() {
  if (candidatesUnsub) candidatesUnsub();
  candidatesUnsub = watchCandidates(function(candidates) {
    currentCandidates = candidates;
    window.renderTable();
  });

  if (jobsUnsub) jobsUnsub();
  jobsUnsub = watchJobs(function(jobs) {
    jobs.forEach(function(j, index) {
      j.id = j.id || index;
      j.num = j.num || j.jobTypeCode || (index + 1);
    });
    window.currentJobs = jobs;
    if (window.lastSortCol !== null) {
      sortTable(window.lastSortCol);
    } else {
      window.currentJobs.sort(function(a,b) {
        return String(b.createdDate || b.createdAt || '').localeCompare(String(a.createdDate || a.createdAt || ''));
      });
      window.renderTable();
    }
  });
});
</script>
</body>
